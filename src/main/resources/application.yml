server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/smartprocure_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root@123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    com.smartprocure: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

security:
  jwt:
    issuer: smartprocure
    # For HS256 the secret must be at least 32 bytes. Replace for production.
    secret: "CHANGE_ME_CHANGE_ME_CHANGE_ME_CHANGE_ME_32+chars"
    access-token-expiration-minutes: 60

